    <style>
        body { margin: 0; padding: 0; background: #222; }
        .gallery-container {
          display: flex;
          width: 90vw;
          max-width: 1200px;
          height: 60vh;
          margin: 10vh auto;
          gap: 10px;
        }
        .gallery-panel {
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
          height: 100%;
          border-radius: 50px;
          color: white;
          cursor: pointer;
          flex: 0.5;
          position: relative;
          transition: flex 0.7s cubic-bezier(0.15, 0.85, 0.35, 1), filter 0.7s ease;
          filter: grayscale(80%) blur(3px);
          overflow: hidden;
        }
        .gallery-panel h3 {
          font-family: 'Inter', sans-serif;
          font-size: 2rem;
          position: absolute;
          bottom: 20px;
          left: 20px;
          margin: 0;
          opacity: 0;
          transition: opacity 0.3s ease-in 0.4s;
          text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
        .gallery-panel.active {
          flex: 5;
          filter: grayscale(0%) blur(0px);
        }
        .gallery-panel.active h3 {
          opacity: 1;
        }
        @media (max-width: 768px) {
          .gallery-container { width: 95vw; height: 50vh; }
          .gallery-panel h3 { font-size: 1.2rem; }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const panels = document.querySelectorAll('.gallery-panel');
            if(!panels.length) return;

            panels.forEach(panel => {
                panel.addEventListener('click', () => {
                    removeActiveClasses();
                    panel.classList.add('active');
                });
            });

            function removeActiveClasses() {
                panels.forEach(panel => {
                    panel.classList.remove('active');
                });
            }
        });
    </script>
